<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Azubuike Protocol Deck // Project 2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #070708; 
            color: #39ff14; 
            font-family: monospace; 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }
        
        /* Layout Header & Panic Switch Configuration */
        header { 
            padding: 10px 14px; 
            background: #0d0d11; 
            border-bottom: 1px solid #222; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px; 
            font-weight: bold; 
            letter-spacing: 1px; 
        }
        button.panic-switch {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 6px 12px;
            font-family: monospace;
            font-weight: bold;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.4);
        }
        button.panic-switch:active { background: #b91c1c; }
        
        /* Network & Signaling Control Panel */
        .network-panel { 
            background: #111116; 
            border-bottom: 1px solid #222; 
            padding: 12px; 
        }
        .network-row { 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            justify-content: space-between; 
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .net-input { 
            width: 90px; 
            background: #161622; 
            color: #39ff14; 
            border: 1px solid #333; 
            font-size: 15px; 
            padding: 8px; 
            border-radius: 4px; 
            font-family: monospace; 
            text-align: center; 
            font-weight: bold; 
            outline: none;
        }
        .net-input:focus { border-color: #39ff14; }
        .room-display { font-size: 13px; color: #ffaa00; font-weight: bold; }
        
        /* Terminal Logs Matrix */
        .memory-log { 
            flex: 1; 
            background: #050507; 
            padding: 16px; 
            overflow-y: auto; 
            font-size: 12px; 
            color: #aaa; 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .log-entry { 
            padding-left: 8px; 
            line-height: 1.4; 
            word-break: break-all;
            white-space: pre-wrap;
        }
        .log-entry.sys { border-left: 2px solid #64748b; color: #8892b0; }
        .log-entry.net { border-left: 2px solid #ffaa00; color: #ffaa00; }
        .log-entry.human { border-left: 2px solid #a855f7; color: #a855f7; font-weight: bold; }
        .log-entry.remote { border-left: 2px solid #33b5ff; color: #33b5ff; font-weight: bold; }

        /* Control Input Deck */
        .control-panel { 
            background: #0f0f14; 
            border-top: 1px solid #222; 
            padding: 14px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        .input-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        textarea { 
            height: 80px; 
            background: #141418; 
            color: #fff; 
            border: 1px solid #2a2a35; 
            border-radius: 4px; 
            padding: 12px; 
            font-family: monospace; 
            font-size: 13px; 
            resize: none; 
            outline: none; 
        }
        
        /* Interface Action Triggers */
        button.action-btn { 
            border: none; 
            padding: 10px 16px; 
            font-weight: bold; 
            font-size: 11px; 
            border-radius: 4px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-family: monospace;
        }
        button.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        button.net-btn { background: #ffaa00; color: #000; }
        button.join-btn { background: #00ff66; color: #000; }
        button.execute-btn { background: #1e293b; color: #64748b; font-size: 12px; padding: 14px; }

        /* ANTI-SNAPSHOT MOBILE BLUR BLANKET */
        #anti-snapshot-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 99999;
        }
    </style>
</head>
<body>

    <div id="anti-snapshot-overlay"></div>

    <header>
        <span>AZUBUIKE TECH // PROJECT 2 v1.1.0</span>
        <button id="hard-panic-trigger" class="panic-switch">Panic Kill</button>
    </header>

    <div class="network-panel">
        <div class="network-row">
            <button id="init-peer" class="action-btn net-btn">Create Secure Channel</button>
            <span id="room-id-view" class="room-display">PIN: ----</span>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input id="remote-pin" class="net-input" type="text" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="4-PIN" autocomplete="off">
                <button id="connect-peer" class="action-btn join-btn">Join Channel</button>
            </div>
        </div>
    </div>

    <div class="memory-log" id="log-window">
        <div class="log-entry sys">[SYS] Air-Gapped volatile communication module armed.</div>
        <div class="log-entry sys">[SYS] Ready for initialization routing parameters...</div>
    </div>

    <div class="control-panel">
        <div class="input-container">
            <textarea id="code-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Awaiting connection verification map to unlock encryption matrix..."></textarea>
            <button id="execute-action" class="action-btn execute-btn">Highway Locked</button>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
